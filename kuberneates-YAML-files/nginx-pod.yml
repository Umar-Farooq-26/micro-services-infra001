  apiVersion: v1
  kind: Pod
  metadata:
    name: nginx-pod
    labels:
      app: nginx
  spec:
    containers:
    - name: nginx-container
      image: nginx:latest
      ports: 
      - containerPort: 80

      volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: pod-data

    volumes:
    - name: pod-data
      emptyDir:
        medium: "Memory"
        sizeLimit: 500Mi
